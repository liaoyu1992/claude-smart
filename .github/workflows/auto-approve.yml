name: Auto-approve & merge admin PRs

on:
  pull_request_target:
    types: [opened, ready_for_review, reopened]

jobs:
  auto-approve:
    runs-on: ubuntu-latest
    # Only run for repo owner
    if: contains(fromJSON('["liaoyu1992"]'), github.event.pull_request.user.login)
    steps:
      - name: Approve PR
        env:
          GH_TOKEN: ${{ secrets.BOT_REVIEWER_TOKEN }}
        run: |
          gh pr review ${{ github.event.pull_request.number }} \
            --repo ${{ github.repository }} \
            --approve \
            --body "🤖 Auto-approved by bot reviewer"

      - name: Enable auto-merge (squash)
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.BOT_REVIEWER_TOKEN }}
        run: |
          # Request auto-merge: GitHub squash-merges once the required review
          # (approved above) AND required status check (lint & verify) both
          # pass. Never merges before CI is green.
          gh pr merge ${{ github.event.pull_request.number }} \
            --repo ${{ github.repository }} \
            --auto --squash \
            --delete-branch
